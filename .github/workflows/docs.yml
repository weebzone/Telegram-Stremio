name: Deploy Docs to GitHub Pages

# Builds the Sphinx (Furo) documentation in docs/ and publishes it to GitHub Pages.
# Runs on every push to main/master that touches the docs, and can be triggered manually.
#
# One-time setup (all doable from a browser):
#   1. Merge this workflow into your default branch (main/master).
#   2. In this GitHub repo: Settings -> Pages -> "Build and deployment"
#        - Source: "GitHub Actions"
#   3. Push a commit to docs/ (or run this workflow manually from the Actions tab).
#      Your site will be published at:
#        https://<your-username>.github.io/<your-repo>/
#
# No secrets required — GitHub Pages uses the built-in GITHUB_TOKEN.

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install documentation dependencies
        run: pip install -r docs/requirements.txt

      - name: Build the documentation
        run: sphinx-build -b html -W --keep-going docs docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
