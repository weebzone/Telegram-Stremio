{% extends "base.html" %}
{% block title %}Health & Diagnostics - Telegram Stremio{% endblock %}

{% block content %}
<style>
  .hz-shell { max-width: 960px; margin: 0 auto; }
  .hz-overall { display: flex; align-items: center; gap: 1rem; padding: 1.25rem 1.5rem; border-radius: 1.25rem;
                border: 1px solid var(--hairline, rgba(255,255,255,0.1)); background: var(--surface, rgba(255,255,255,0.03)); }
  .hz-dot { width: 0.9rem; height: 0.9rem; border-radius: 999px; flex-shrink: 0; }
  .hz-card { border: 1px solid var(--hairline, rgba(255,255,255,0.08)); background: var(--surface, rgba(255,255,255,0.03));
             border-radius: 1.1rem; padding: 1.1rem 1.25rem; }
  .hz-head { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; }
  .hz-title { font-weight: 800; font-size: 1rem; display: flex; align-items: center; gap: 0.6rem; }
  .hz-badge { padding: 0.2rem 0.7rem; border-radius: 999px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
  .s-ok { background: #22c55e22; color: #22c55e; }
  .s-degraded, .s-warning, .s-not_configured { background: #f59e0b22; color: #f59e0b; }
  .s-down, .s-error, .s-critical { background: #ef444422; color: #ef4444; }
  .dot-ok { background: #22c55e; } .dot-warning { background: #f59e0b; } .dot-critical { background: #ef4444; }
  .hz-msg { color: var(--text-sec); font-size: 0.85rem; margin-top: 0.5rem; word-break: break-word; }
  .hz-sub { margin-top: 0.85rem; display: flex; flex-direction: column; gap: 0.5rem; }
  .hz-item { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; font-size: 0.85rem;
             border-top: 1px solid var(--hairline, rgba(255,255,255,0.06)); padding-top: 0.5rem; }
  .hz-item .lbl { font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
  .hz-item .meta { color: var(--text-sec); font-size: 0.78rem; text-align: right; }
  .hz-bar { height: 6px; border-radius: 999px; background: var(--hairline, rgba(255,255,255,0.12)); overflow: hidden; width: 120px; margin-top: 3px; }
  .hz-bar > span { display: block; height: 100%; background: var(--primary); }
  .mini-dot { width: 0.55rem; height: 0.55rem; border-radius: 999px; display: inline-block; }
</style>

<div class="hz-shell">
  <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
    <div>
      <h1 class="section-title text-2xl sm:text-3xl">Health &amp; Diagnostics</h1>
      <p class="muted text-sm mt-1">A quick check of your databases, bot clients, TMDB key and public URL.</p>
    </div>
    <button id="hz-refresh" onclick="loadHealth()" class="btn-ui btn-primary"><i class="fa-solid fa-stethoscope"></i> Run checks</button>
  </div>

  <div id="hz-overall" class="hz-overall mb-5">
    <span class="hz-dot dot-warning"></span>
    <div><div style="font-weight:800">Running checks…</div><div class="muted text-sm" id="hz-generated"></div></div>
  </div>

  <div id="hz-cards" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
</div>

<script>
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}

function badge(status){ return `<span class="hz-badge s-${esc(status)}">${esc(String(status).replace('_',' '))}</span>`; }
function miniDot(ok){ return `<span class="mini-dot" style="background:${ok ? '#22c55e' : '#ef4444'}"></span>`; }

function dbItems(sec){
  return (sec.items||[]).map(i => `
    <div class="hz-item">
      <div class="lbl">${miniDot(i.status==='ok')} ${esc(i.name)}</div>
      <div class="meta">
        ${i.status==='ok' ? `${esc(i.size_mb)} MB
          <div class="hz-bar"><span style="width:${Math.min(100, i.usage_pct||0)}%"></span></div>
          <span style="font-size:.7rem">${esc(i.usage_pct)}% of 512MB</span>`
        : esc(i.message||'unreachable')}
      </div>
    </div>`).join('');
}

function botItems(sec){
  return (sec.items||[]).map(i => `
    <div class="hz-item">
      <div class="lbl">${miniDot(i.connected)} ${esc(i.name)}</div>
      <div class="meta">${i.connected ? 'connected' : 'offline'}${i.dc!=null ? ' · DC'+esc(i.dc) : ''} · load ${esc(i.workload)}</div>
    </div>`).join('');
}

function cardHtml(sec){
  const icon = {databases:'fa-database', bots:'fa-robot', tmdb:'fa-film', base_url:'fa-link'}[sec.key] || 'fa-circle-check';
  let body = '';
  if (sec.key === 'databases') body = `<div class="hz-sub">${dbItems(sec)}</div>`;
  else if (sec.key === 'bots') body = `<div class="hz-sub">${botItems(sec)}</div>`;
  else body = `<div class="hz-msg">${esc(sec.message||'')}${sec.url ? '<br><span style="opacity:.7">'+esc(sec.url)+'</span>' : ''}</div>`;

  const summary = (sec.up!=null && sec.total!=null) ? `<span class="muted text-xs">${sec.up}/${sec.total} up</span>` : '';
  return `<div class="hz-card">
    <div class="hz-head">
      <div class="hz-title"><i class="fa-solid ${icon}"></i> ${esc(sec.label)}</div>
      <div class="flex items-center gap-2">${summary} ${badge(sec.status)}</div>
    </div>
    ${body}
  </div>`;
}

async function loadHealth(){
  const btn = document.getElementById('hz-refresh');
  btn.disabled = true;
  const old = btn.innerHTML;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Checking…';
  try {
    const res = await fetch('/api/admin/health/report');
    const data = await res.json();
    if (data.status !== 'success') throw new Error(data.message || 'Failed');
    const d = data.data || {};
    const overall = d.overall || 'warning';
    const labels = {ok:'All systems operational', warning:'Attention needed', critical:'Critical issues detected'};
    document.getElementById('hz-overall').innerHTML =
      `<span class="hz-dot dot-${overall}"></span>
       <div><div style="font-weight:800">${esc(labels[overall]||overall)}</div>
       <div class="muted text-sm">Last checked: ${d.generated_at ? new Date(d.generated_at+'Z').toLocaleString() : '—'}</div></div>`;
    document.getElementById('hz-cards').innerHTML = (d.sections||[]).map(cardHtml).join('');
  } catch (e) {
    document.getElementById('hz-cards').innerHTML = `<div class="hz-card" style="color:#ef4444">Failed to run health checks.</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = old;
  }
}

document.addEventListener('DOMContentLoaded', loadHealth);
</script>
{% endblock %}
