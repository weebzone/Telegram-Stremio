{% extends "base.html" %}
{% block title %}Content Requests - Telegram Stremio{% endblock %}

{% block content %}
<style>
  .rq-shell { max-width: 1180px; margin: 0 auto; }
  .rq-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .rq-tab { padding: 0.5rem 1.1rem; border-radius: 9999px; border: 1px solid var(--hairline, rgba(255,255,255,0.1));
            cursor: pointer; font-weight: 700; font-size: 0.9rem; color: var(--text-sec); background: transparent; }
  .rq-tab.active { background: var(--primary); color: var(--bg); border-color: var(--primary); }
  .rq-filters { display: flex; gap: 0.35rem; flex-wrap: wrap; }
  .rq-chip { padding: 0.3rem 0.8rem; border-radius: 9999px; border: 1px solid var(--hairline, rgba(255,255,255,0.1));
             cursor: pointer; font-size: 0.78rem; font-weight: 600; color: var(--text-sec); background: transparent; }
  .rq-chip.active { background: color-mix(in srgb, var(--primary) 20%, transparent); color: var(--primary); border-color: var(--primary); }
  .rq-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
  .rq-card { background: var(--surface, rgba(255,255,255,0.03)); border: 1px solid var(--hairline, rgba(255,255,255,0.08));
             border-radius: 1rem; overflow: hidden; display: flex; flex-direction: column; }
  .rq-poster { position: relative; aspect-ratio: 2/3; background: linear-gradient(135deg, #1f2937, #111827); }
  .rq-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .rq-poster .noimg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--text-sec); }
  .rq-count { position: absolute; top: 0.5rem; left: 0.5rem; background: rgba(0,0,0,0.65); color: #fff;
              padding: 0.15rem 0.55rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; }
  .rq-badge { position: absolute; top: 0.5rem; right: 0.5rem; padding: 0.15rem 0.55rem; border-radius: 9999px;
              font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
  .b-pending { background: #f59e0b; color: #111; }
  .b-uploaded { background: #22c55e; color: #052e16; }
  .b-denied { background: #64748b; color: #fff; }
  .b-banned { background: #ef4444; color: #fff; }
  .rq-body { padding: 0.7rem 0.8rem; flex: 1; display: flex; flex-direction: column; gap: 0.35rem; }
  .rq-title { font-weight: 700; font-size: 0.92rem; line-height: 1.25; }
  .rq-id { font-size: 0.72rem; color: var(--text-sec); word-break: break-all; }
  .rq-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.35rem; padding: 0 0.8rem 0.8rem; }
  .rq-btn { border: none; border-radius: 0.55rem; padding: 0.45rem 0.3rem; font-size: 0.78rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 0.3rem; }
  .rq-btn.wide { grid-column: 1 / -1; }
  .btn-up { background: #22c55e22; color: #22c55e; }
  .btn-deny { background: #64748b22; color: #94a3b8; }
  .btn-ban { background: #ef444422; color: #ef4444; }
  .btn-reopen { background: #f59e0b22; color: #f59e0b; }
  .btn-del { background: transparent; color: var(--text-sec); border: 1px solid var(--hairline, rgba(255,255,255,0.1)); }
  .rq-btn:hover { filter: brightness(1.25); }
  .rq-empty { text-align: center; padding: 3rem 1rem; color: var(--text-sec); }
  .rq-toolbtn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.55rem 1.1rem; border-radius: 0.7rem;
                font-weight: 700; font-size: 0.85rem; cursor: pointer; text-decoration: none; transition: all .15s;
                border: 1px solid var(--hairline, rgba(255,255,255,0.12)); background: var(--surface, rgba(255,255,255,0.04)); color: var(--text); }
  .rq-toolbtn:hover { border-color: var(--primary); color: var(--primary); }
  .rq-toolbtn.primary { background: var(--primary); color: var(--bg); border-color: var(--primary); }
  .rq-toolbtn.primary:hover { filter: brightness(1.1); color: var(--bg); }
  .rq-pager { display: flex; align-items: center; justify-content: center; gap: 0.9rem; margin-top: 1.75rem; }
  .rq-pager button { border: 1px solid var(--hairline, rgba(255,255,255,0.12)); background: transparent; color: var(--text);
                     border-radius: 0.6rem; padding: 0.45rem 1rem; cursor: pointer; font-weight: 700; }
  .rq-pager button:disabled { opacity: 0.35; cursor: not-allowed; }
  .rq-pager .pageinfo { color: var(--text-sec); font-size: 0.85rem; font-weight: 600; }
</style>

<div class="rq-shell">
  <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
    <div>
      <h1 class="section-title text-2xl sm:text-3xl">Content Requests</h1>
      <p class="muted text-sm mt-1">Titles your users requested from the public request page.</p>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="loadRequests()" class="rq-toolbtn"><i class="fa-solid fa-rotate"></i> Refresh</button>
      <a href="/request" target="_blank" class="rq-toolbtn primary"><i class="fa-solid fa-arrow-up-right-from-square"></i> Public page</a>
    </div>
  </div>

  <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
    <div class="rq-tabs">
      <button class="rq-tab active" data-type="movie" onclick="setType(this,'movie')">🎬 Movies <span id="cnt-movie">0</span></button>
      <button class="rq-tab" data-type="tv" onclick="setType(this,'tv')">📺 TV Shows <span id="cnt-tv">0</span></button>
    </div>
  </div>

  <div class="rq-filters mb-5">
    <button class="rq-chip active" data-status="" onclick="setStatusFilter(this,'')">All</button>
    <button class="rq-chip" data-status="pending" onclick="setStatusFilter(this,'pending')">Pending</button>
    <button class="rq-chip" data-status="uploaded" onclick="setStatusFilter(this,'uploaded')">Uploaded</button>
    <button class="rq-chip" data-status="denied" onclick="setStatusFilter(this,'denied')">Denied</button>
    <button class="rq-chip" data-status="banned" onclick="setStatusFilter(this,'banned')">Banned</button>
  </div>

  <div id="rq-grid" class="rq-grid"></div>
  <div id="rq-pager" class="rq-pager"></div>
</div>

<script>
let allRequests = [];
let curType = 'movie';
let curStatus = '';
let curPage = 1;
const PER_PAGE = 18;

function esc(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function setType(btn, type) {
  curType = type;
  curPage = 1;
  document.querySelectorAll('.rq-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setStatusFilter(btn, status) {
  curStatus = status;
  curPage = 1;
  document.querySelectorAll('.rq-chip').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function goPage(delta) {
  curPage += delta;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function idLine(r) {
  if (r.tmdb_id && r.imdb_id) return `TMDB ${esc(r.tmdb_id)} · ${esc(r.imdb_id)}`;
  if (r.tmdb_id) return `TMDB ${esc(r.tmdb_id)}`;
  if (r.imdb_id) return esc(r.imdb_id);
  return '';
}

function cardHtml(r) {
  const poster = r.poster
    ? `<img src="${esc(r.poster)}" loading="lazy" alt="">`
    : `<div class="noimg"><i class="fa-solid fa-film"></i></div>`;
  const yr = r.year ? ` (${esc(r.year)})` : '';
  let actions = '';
  if (r.status !== 'uploaded')
    actions += `<button class="rq-btn btn-up" onclick="setStatus('${r._id}','uploaded')"><i class="fa-solid fa-check"></i> Uploaded</button>`;
  if (r.status !== 'denied')
    actions += `<button class="rq-btn btn-deny" onclick="setStatus('${r._id}','denied')"><i class="fa-solid fa-xmark"></i> Deny</button>`;
  if (r.status !== 'banned')
    actions += `<button class="rq-btn btn-ban" onclick="setStatus('${r._id}','banned')"><i class="fa-solid fa-ban"></i> Ban</button>`;
  if (r.status !== 'pending')
    actions += `<button class="rq-btn btn-reopen" onclick="setStatus('${r._id}','pending')"><i class="fa-solid fa-rotate-left"></i> Reopen</button>`;
  actions += `<button class="rq-btn btn-del wide" onclick="removeRequest('${r._id}')"><i class="fa-solid fa-trash"></i> Delete</button>`;

  return `<div class="rq-card">
    <div class="rq-poster">
      ${poster}
      <span class="rq-count">👥 ${esc(r.request_count || 0)}</span>
      <span class="rq-badge b-${esc(r.status)}">${esc(r.status)}</span>
    </div>
    <div class="rq-body">
      <div class="rq-title">${esc(r.title)}${yr}</div>
      <div class="rq-id">${idLine(r)}</div>
    </div>
    <div class="rq-actions">${actions}</div>
  </div>`;
}

function render() {
  const movies = allRequests.filter(r => r.media_type === 'movie');
  const tv = allRequests.filter(r => r.media_type === 'tv');
  document.getElementById('cnt-movie').textContent = movies.length;
  document.getElementById('cnt-tv').textContent = tv.length;

  let items = curType === 'tv' ? tv : movies;
  if (curStatus) items = items.filter(r => r.status === curStatus);

  const totalPages = Math.max(1, Math.ceil(items.length / PER_PAGE));
  if (curPage > totalPages) curPage = totalPages;
  if (curPage < 1) curPage = 1;
  const pageItems = items.slice((curPage - 1) * PER_PAGE, curPage * PER_PAGE);

  const grid = document.getElementById('rq-grid');
  grid.innerHTML = pageItems.length
    ? pageItems.map(cardHtml).join('')
    : `<div class="rq-empty" style="grid-column:1/-1"><i class="fa-solid fa-inbox" style="font-size:2rem;opacity:.5"></i><p class="mt-2">No ${curStatus || ''} ${curType === 'tv' ? 'TV' : 'movie'} requests.</p></div>`;

  const pager = document.getElementById('rq-pager');
  if (items.length > PER_PAGE) {
    pager.innerHTML =
      `<button onclick="goPage(-1)" ${curPage <= 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-left"></i> Prev</button>
       <span class="pageinfo">Page ${curPage} of ${totalPages} · ${items.length} total</span>
       <button onclick="goPage(1)" ${curPage >= totalPages ? 'disabled' : ''}>Next <i class="fa-solid fa-chevron-right"></i></button>`;
  } else {
    pager.innerHTML = '';
  }
}

async function loadRequests() {
  const grid = document.getElementById('rq-grid');
  grid.innerHTML = `<p class="muted text-sm" style="grid-column:1/-1">Loading…</p>`;
  try {
    const res = await fetch('/api/admin/requests');
    const data = await res.json();
    if (data.status !== 'success') throw new Error(data.message || 'Failed');
    allRequests = data.data || [];
    render();
  } catch (e) {
    grid.innerHTML = `<p style="color:#ef4444;grid-column:1/-1">Failed to load requests.</p>`;
  }
}

async function setStatus(id, status) {
  try {
    const res = await fetch('/api/admin/requests/' + id, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Update failed');
    const item = allRequests.find(r => r._id === id);
    if (item) item.status = status;
    render();
    showToast('Marked ' + status + '.', 'success', 'Updated');
  } catch (e) {
    showToast(e.message || 'Update failed', 'error', 'Error');
  }
}

async function removeRequest(id) {
  try {
    const res = await fetch('/api/admin/requests/' + id, { method: 'DELETE' });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.detail || 'Delete failed');
    allRequests = allRequests.filter(r => r._id !== id);
    render();
    showToast('Request deleted.', 'success', 'Deleted');
  } catch (e) {
    showToast(e.message || 'Delete failed', 'error', 'Error');
  }
}

document.addEventListener('DOMContentLoaded', loadRequests);
</script>
{% endblock %}
